version: "1.0"

input:
  base_path: "../../../../chains/evm"  # Directory containing abi/ and bytecode/ folders

output:
  base_path: "." # Directory for generated operations/

# Access control aliases
# - owner: Only contract owner can call (OnlyOwner)
# - (none): Public/Read functions don't need access control

contracts:
  - contract_name: FeeQuoter
    version: "2.0.0"
    functions:
      - name: applyDestChainConfigUpdates
        access: owner
      - name: updatePrices
        access: owner
      - name: applyAuthorizedCallerUpdates
        access: owner
      - name: applyTokenTransferFeeConfigUpdates
        access: owner
      - name: getDestChainConfig
        access: public
      - name: getDestinationChainGasPrice
        access: public
      - name: getTokenTransferFeeConfig
        access: public
      - name: getStaticConfig
        access: public
      - name: getAllAuthorizedCallers
        access: public

  - contract_name: FactoryBurnMintERC20
    version: "1.7.0"
    package_name: erc20
    abi_file: factory_burn_mint_erc20.json
    no_deployment: true
    functions:
      - name: approve
        access: public
      - name: balanceOf
        access: public

  - contract_name: ERC20LockBox
    version: "1.7.0"
    functions:
      - name: applyAuthorizedCallerUpdates
        access: owner
      - name: deposit
        access: owner
      - name: getAllAuthorizedCallers
        access: public

  - contract_name: LockReleaseTokenPool
    version: "1.7.0"
    no_deployment: true
    functions:
      - name: getLockBox
        access: public

  - contract_name: SiloedLockReleaseTokenPool
    version: "1.7.0"
    no_deployment: true
    functions:
      - name: getLockBox
        access: public
      - name: getAllLockBoxConfigs
        access: public
