version: "1.0.0"
chain_family: evm

input:
  gobindings_package: "../gobindings/generated"

output:
  base_path: "."

# Access control aliases
# - owner: Only contract owner can call (OnlyOwner)
# - (none): Public/Read functions don't need access control

contracts:
  - contract_name: BurnMintTokenPoolAndProxy
    version: "1.5.0"
    functions:
      - name: getRemotePool
        access: public
      - name: getCurrentInboundRateLimiterState
        access: public
      - name: getCurrentOutboundRateLimiterState
        access: public
      - name: getPreviousPool
        access: public

  - contract_name: TokenPool
    version: "1.6.1"
    omit_deploy: true
    functions:
      - name: applyChainUpdates
        access: owner
      - name: setRateLimitAdmin
        access: owner
      - name: getRateLimitAdmin
        access: public
      - name: transferOwnership
        access: owner
      - name: setChainRateLimiterConfigs
        access: owner
      - name: setChainRateLimiterConfig
        access: owner
      - name: getToken
        access: public
      - name: getTokenDecimals
        access: public
      - name: isSupportedToken
        access: public
      - name: getAllowListEnabled
        access: public
      - name: getAllowList
        access: public
      - name: applyAllowListUpdates
        access: owner
      - name: getRouter
        access: public
      - name: setRouter
        access: owner
      - name: getSupportedChains
        access: public
      - name: getRemoteToken
        access: public
      - name: getRemotePools
        access: public
      - name: addRemotePool
        access: owner
      - name: removeRemotePool
        access: owner
      - name: getCurrentInboundRateLimiterState
        access: public
      - name: getCurrentOutboundRateLimiterState
        access: public

  - contract_name: BurnFromMintTokenPool
    version: "1.6.1"

  - contract_name: BurnToAddressMintTokenPool
    version: "1.6.1"

  - contract_name: BurnWithFromMintTokenPool
    version: "1.6.1"
