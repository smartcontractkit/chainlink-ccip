        access: public
      - name: isSupportedToken
        access: public
      - name: getAllowListEnabled
        access: public
      - name: getAllowList
        access: public
      - name: applyAllowListUpdates
        access: owner
      - name: getRouter
        access: public
      - name: setRouter
        access: owner
